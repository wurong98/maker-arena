<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略管理 - Maker Arena</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">M</span>
                    <span class="logo-text">Maker Arena</span>
                </div>
            </div>
            <div class="header-right">
                <a href="index.html" class="btn btn-outline">返回交易界面</a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content strategy-management">
            <div class="strategy-management-container">
                <!-- 策略列表 -->
                <div class="panel">
                    <div class="panel-header">
                        <h3>策略列表</h3>
                        <button class="btn btn-primary" id="createStrategyBtn">新建策略</button>
                    </div>
                    <div class="panel-body">
                        <div class="strategy-list-full" id="strategyManagementList">
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                </div>

                <!-- 策略详情 -->
                <div class="panel" id="strategyDetailPanel" style="display: none;">
                    <div class="panel-header">
                        <h3>策略详情</h3>
                    </div>
                    <div class="panel-body">
                        <div class="strategy-detail" id="strategyDetail">
                            <div class="detail-row">
                                <span class="detail-label">策略名称</span>
                                <span class="detail-value" id="detailName">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">状态</span>
                                <span class="detail-value" id="detailStatus">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">初始资金</span>
                                <span class="detail-value" id="detailInitialBalance">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">当前余额</span>
                                <span class="detail-value" id="detailBalance">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">收益率</span>
                                <span class="detail-value" id="detailReturn">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">创建时间</span>
                                <span class="detail-value" id="detailCreatedAt">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">总成交数</span>
                                <span class="detail-value" id="detailTotalTrades">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">总强平次数</span>
                                <span class="detail-value" id="detailTotalLiquidations">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">API-Key</span>
                                <div class="api-key-container">
                                    <span class="detail-value api-key-value" id="detailAPIKey">点击获取</span>
                                    <button class="btn btn-sm btn-outline" id="getAPIKeyBtn">获取</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-simple">
                Maker Arena - 模拟交易系统
            </div>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/strategy.js"></script>

    <!-- 新建策略模态框 -->
    <div class="modal" id="createStrategyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建策略</h3>
                <span class="modal-close" id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="createStrategyForm">
                    <div class="form-group">
                        <label for="strategyName">策略名称</label>
                        <input type="text" id="strategyName" required placeholder="请输入策略名称">
                    </div>
                    <div class="form-group">
                        <label for="strategyDescription">描述</label>
                        <textarea id="strategyDescription" placeholder="请输入策略描述（可选）"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="strategyBalance">初始资金 (USDC)</label>
                        <input type="number" id="strategyBalance" required placeholder="请输入初始资金" value="10000">
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">管理员密码</label>
                        <input type="password" id="adminPassword" required placeholder="请输入管理员密码">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" id="cancelCreate">取消</button>
                        <button type="submit" class="btn btn-primary">创建</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
